<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>DHCP Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	
    <style>
        .table-container { overflow-x: auto; max-width: 100%; }
        table th { position: sticky; top: 0; background: #343a40; color: white; z-index: 10; }
        .hints-content { font-size: 0.67em; }
    </style>
	
</head>
<body class="p-3">
<div class="container">
    <h2>DHCP Log</h2>
    <div class="mb-3">
        <a class="btn btn-warning" href="../../dhcp">Zurück</a>
        <button class="btn btn-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#headerInfo">Hinweise anzeigen</button>
        <a href="{{ url_for('logdatei') }}" target=_blank class="btn btn-info me-2">Original Logdatei anzeigen</a>
    </div>
    <div class="collapse mb-3" id="headerInfo">
        <div class="card card-body hints-content">
            {% for h in hints %}
                <div>{{ h }}</div>
            {% endfor %}
        </div>
    </div>
    <div class="table-container">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    {% for col in filtered_header %}
                        <th>{{ col }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in filtered_rows %}
                    <tr>
                        {% for val in row %}
                            <td>{{ val }}</td>
                        {% endfor %}
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
